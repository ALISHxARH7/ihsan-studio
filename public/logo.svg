<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" stroke="#B8976A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Roof / top structure -->
  <polyline points="60,95 100,40 140,95" />
  <!-- Inner hexagonal shape -->
  <polyline points="75,95 100,55 125,95" />
  <!-- Horizontal beam -->
  <line x1="50" y1="95" x2="150" y2="95" />
  <!-- Left pillar -->
  <line x1="60" y1="95" x2="60" y2="150" />
  <!-- Right pillar -->
  <line x1="140" y1="95" x2="140" y2="150" />
  <!-- Inner left doorway -->
  <polyline points="85,150 85,110 100,110" />
  <!-- Inner right doorway -->
  <polyline points="115,150 115,110 100,110" />
  <!-- Text: IHSAN STUDIO -->
  <text x="100" y="180" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="400" letter-spacing="6" fill="#B8976A" stroke="none">IHSAN STUDIO</text>
  <!-- Text: ARCHITECTURE -->
  <text x="100" y="200" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="300" letter-spacing="4" fill="#8A8A8A" stroke="none">ARCHITECTURE</text>
</svg>
